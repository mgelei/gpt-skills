name: Package Prompt Architect plugin

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package-plugin:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Derive and validate plugin version
        id: version
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          version="${TAG_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must use a SemVer-compatible v-tag such as v1.2.3; got: $TAG_NAME" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Assemble plugin package
        shell: bash
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          plugin_root="dist/prompt-architect"
          mkdir -p \
            "$plugin_root/.codex-plugin" \
            "$plugin_root/assets" \
            "$plugin_root/skills/prompt-architect"
          cp -R prompt-architect/. "$plugin_root/skills/prompt-architect/"
          base64 --decode > "$plugin_root/assets/icon.png" <<'BASE64'
          
          BASE64

          jq -n \
            --arg version "$PLUGIN_VERSION" \
            '{
              name: "prompt-architect",
              version: $version,
              description: "Turn rough prompt ideas into complete, production-ready prompts through an iterative decision ledger.",
              author: {
                name: "Mate Gelei-Szego",
                url: "https://mate.gelei.dev"
              },
              homepage: "https://mate.gelei.dev",
              repository: "https://github.com/mgelei/gpt-skills/tree/main/prompt-architect",
              license: "MIT",
              keywords: ["prompts", "prompt-engineering", "productivity"],
              skills: "./skills/",
              interface: {
                displayName: "Prompt Architect",
                shortDescription: "Turn rough ideas into production-ready prompts",
                longDescription: "Refine rough prompt ideas through an iterative clarification workflow and stable-numbered decision ledger, then render a complete prompt for ChatGPT or Codex.",
                developerName: "Mate Gelei-Szego",
                category: "Productivity",
                capabilities: ["Prompt design", "Prompt refinement"],
                websiteURL: "https://mate.gelei.dev",
                defaultPrompt: [
                  "Use Prompt Architect to turn this rough idea into a production-ready ChatGPT or Codex prompt."
                ],
                brandColor: "#232B55",
                composerIcon: "./assets/icon.png",
                logo: "./assets/icon.png"
              }
            }' > "$plugin_root/.codex-plugin/plugin.json"

      - name: Validate plugin package
        shell: bash
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          plugin_root="dist/prompt-architect"
          manifest="$plugin_root/.codex-plugin/plugin.json"

          test -f "$manifest"
          test -f "$plugin_root/skills/prompt-architect/SKILL.md"

          jq -e \
            --arg version "$PLUGIN_VERSION" \
            '.name == "prompt-architect"
              and .version == $version
              and (.description | type == "string" and length > 0)
              and (.author.name | type == "string" and length > 0)
              and .skills == "./skills/"
              and .homepage == "https://mate.gelei.dev"
              and (.interface.displayName | type == "string" and length > 0)
              and (.interface.shortDescription | type == "string" and length > 0)
              and (.interface.longDescription | type == "string" and length > 0)
              and (.interface.developerName | type == "string" and length > 0)
              and (.interface.category | type == "string" and length > 0)
              and (.interface.capabilities | type == "array" and length > 0)
              and (.interface.defaultPrompt | type == "array" and length > 0 and length <= 3)
              and .interface.websiteURL == "https://mate.gelei.dev"
              and (.interface.brandColor | test("^#[0-9A-Fa-f]{6}$"))
              and .interface.composerIcon == "./assets/icon.png"
              and .interface.logo == "./assets/icon.png"' \
            "$manifest" > /dev/null

          python3 - "$plugin_root" "$manifest" <<'PY'
          import json
          import struct
          import sys
          from pathlib import Path

          plugin_root = Path(sys.argv[1]).resolve()
          manifest = json.loads(Path(sys.argv[2]).read_text())

          for field in ("composerIcon", "logo"):
              relative = manifest["interface"][field]
              asset = (plugin_root / relative).resolve()
              if plugin_root not in asset.parents:
                  raise SystemExit(f"{field} escapes the plugin root: {relative}")
              with asset.open("rb") as image:
                  header = image.read(24)
              if header[:8] != b"\x89PNG\r\n\x1a\n" or header[12:16] != b"IHDR":
                  raise SystemExit(f"{field} must reference a PNG image: {relative}")
              width, height = struct.unpack(">II", header[16:24])
              if width != height:
                  raise SystemExit(
                      f"{field} must reference a square image; got {width}x{height}: {relative}"
                  )
          PY

      - name: Create plugin ZIP
        id: package
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          asset_name="prompt-architect-openai-plugin-${TAG_NAME}.zip"
          (cd dist && zip -r "../$asset_name" prompt-architect)
          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Attach plugin ZIP to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          ASSET_NAME: ${{ steps.package.outputs.asset_name }}
        run: gh release upload "$TAG_NAME" "$ASSET_NAME" --clobber
